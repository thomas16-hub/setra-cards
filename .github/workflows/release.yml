name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Build with PyInstaller
        run: pyinstaller build_exe/setra-cards.spec --noconfirm --clean

      - name: Assemble distribution
        shell: pwsh
        run: |
          $stage = "dist/Setra-CARDS-Release"
          Copy-Item -Recurse -Force "dist/Setra-CARDS" $stage
          Copy-Item "build_exe/Instalar.bat" $stage
          Copy-Item "build_exe/Desinstalar.bat" $stage
          Copy-Item "build_exe/LEEME.txt" $stage
          Copy-Item -Recurse "hoteles" "$stage/hoteles"
          Compress-Archive -Path $stage -DestinationPath "dist/setra-cards-$env:GITHUB_REF_NAME.zip" -Force

      - name: Compute SHA-256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/setra-cards-$env:GITHUB_REF_NAME.zip" -Algorithm SHA256).Hash.ToLower()
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "SHA-256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/setra-cards-*.zip
          body: |
            ## Setra CARDS ${{ github.ref_name }}

            Descarga `setra-cards-${{ github.ref_name }}.zip`, descomprime
            y ejecuta `Instalar.bat`.

            sha256: ${{ steps.sha.outputs.sha256 }}
          draft: false
          prerelease: false
